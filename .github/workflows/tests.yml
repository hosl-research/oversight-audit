name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test runner
        run: python -m pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Smoke-test every command
        run: |
          python -m oversight_audit demo > /dev/null
          python -m oversight_audit reveal > /dev/null
          python -m oversight_audit sensitivity --bootstrap 60 > /dev/null
          python -m oversight_audit check examples/typical_audit_schema.json > /dev/null
          python -m oversight_audit check examples/instrumented_schema.json > /dev/null
          python -m oversight_audit estimate examples/queue_export.json > /dev/null
          python -m oversight_audit estimate examples/deliberative_export.json > /dev/null
          python -m oversight_audit generate --out /tmp/log.json > /dev/null
          python -m oversight_audit estimate /tmp/log.json > /dev/null
